[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "JuniorAGI_SDK"
version = "0.62.0"
description = "Apple Silicon Native AGI Substrate"
requires-python = ">=3.10"
dependencies = [
    "mlx>=0.10.0",
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "websockets>=12.0",
    "aiomqtt>=2.0.0",
    "pandas>=2.2.0",
    "pyarrow>=15.0.0"
]
